<main>
  <div class="container">

    <!-- Featured latest post -->
    <section class="home-featured" id="featured-post">

    <!-- More recent posts -->
    <section>

        a <a href="https://seacloudconsulting.com">Sea Cloud Consulting</a> project
      </div>
    </div>
  </div>
</footer>

<script>
(function () {
  function formatDate(str) {
    if (!str) return '';
    var d = new Date(str + 'T12:00:00');
    var months = ['January','February','March','April','May','June','July',
                  'August','September','October','November','December'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function formatDateShort(str) {
    if (!str) return '';
    var d = new Date(str + 'T12:00:00');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  // Root-level posts carry an explicit path; blog/ subfolder posts use slug
  function postUrl(post) {
    return post.path || ('blog/' + post.slug + '.html');
  }

  // Render the featured post section. bodyHtml is the paragraph preview (may be empty).
  function renderFeatured(post, bodyHtml) {
    var tag = (post.tags && post.tags[0]) ? post.tags[0] : '';
    var el = document.getElementById('featured-post');
    if (!el) return;
    var url = postUrl(post);

    var previewHtml = bodyHtml
      ? '<div class="home-featured-body">' + bodyHtml + '</div>'
      : '<p class="home-featured-excerpt">' + (post.excerpt || '') + '</p>';

    el.innerHTML =
      '<div class="home-featured-label">Latest post</div>' +
      '<h1 class="home-featured-title">' +
        '<a href="' + url + '">' + post.title + '</a>' +
      '</h1>' +
      previewHtml +
      '<div class="home-featured-meta">' +
        '<span>' + formatDate(post.date) + '</span>' +
        (tag ? '<span style="color:var(--border-mid)">·</span>' +
               '<span style="color:var(--accent);font-weight:600;">' + tag + '</span>' : '') +
      '</div>' +
      '<div style="margin-top:16px;">' +
        '<a href="' + url + '" class="home-featured-cta">Read the full post →</a>' +
      '</div>';
  }

  function renderCard(post) {
    var tag = (post.tags && post.tags[0]) ? post.tags[0] : '';
    return '<a href="' + postUrl(post) + '" class="post-card">' +
      '<div class="post-card-meta">' +
        '<span>' + formatDateShort(post.date) + '</span>' +
        (tag ? '<span class="post-card-tag">' + tag + '</span>' : '') +
      '</div>' +
      '<div class="post-card-title">' + post.title + '</div>' +
      '<div class="post-card-excerpt">' + (post.excerpt || '') + '</div>' +
      '<div class="post-card-cta">Read →</div>' +
    '</a>';
  }

  // Fetch first 3 paragraphs from the actual post HTML file
  function fetchPostPreview(post) {
    return fetch(postUrl(post))
      .then(function (r) { return r.text(); })
      .then(function (html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var allP = doc.querySelectorAll('.post-body p');
        var paras = [];
        for (var i = 0; i < allP.length && paras.length < 3; i++) {
          var text = allP[i].textContent.trim();
          if (text.length > 40) {
            // Use innerHTML to preserve <strong>, <em>, etc.
            paras.push('<p>' + allP[i].innerHTML + '</p>');
          }
        }
        return paras.join('');
      })
      .catch(function () { return ''; });
  }

  fetch('posts.json')
    .then(function (r) { return r.json(); })
    .then(function (posts) {
      if (!posts || !posts.length) return;
      posts.sort(function (a, b) { return b.date.localeCompare(a.date); });

      var featured = posts[0];
      var rest = posts.slice(1, 3);

      // Render card grid immediately (no fetch needed)
      var gridEl = document.getElementById('recent-posts');
      if (gridEl) gridEl.innerHTML = rest.map(renderCard).join('');

      // Try to load real paragraphs for featured post, fall back to excerpt
      fetchPostPreview(featured).then(function (bodyHtml) {
        renderFeatured(featured, bodyHtml);
      });
    })
    .catch(function () {});
}());
</script>

</body>
</html>
