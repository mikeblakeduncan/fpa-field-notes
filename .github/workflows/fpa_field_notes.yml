name: FPA Field Notes
# DISABLED — schedule triggers removed April 2026 as part of site rebuild.
# The digest pipeline has been deprecated. Do not re-add schedule triggers.
# Keep for reference only. Run manually via workflow_dispatch if needed.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to website?'
        type: boolean
        default: false
      force_pipeline:
        description: 'Force full Tuesday pipeline (even if not Tuesday)?'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run FPA Field Notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INBOX_GMAIL_ADDRESS: ${{ secrets.INBOX_GMAIL_ADDRESS }}
          INBOX_GMAIL_APP_PASSWORD: ${{ secrets.INBOX_GMAIL_APP_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          PUBLISH_TO_WEB: ${{ github.event_name == 'schedule' && 'true' || inputs.publish }}
          FORCE_PIPELINE: ${{ inputs.force_pipeline || 'false' }}
        run: python content-radar/FPA_Field_Notes.py
