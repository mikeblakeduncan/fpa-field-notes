<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — FP&amp;A Field Notes</title>
  <meta name="description" content="Practitioner articles on FP&A, forecasting, AI in finance, and building finance teams at growth-stage companies.">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DTR4KSL0LS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DTR4KSL0LS');
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="nav-brand">FP&amp;A Field Notes</a>
    <ul class="nav-links">
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="knowledge.html">Knowledge Base</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="container">
    <section class="page-hero">
      <div class="page-hero-label">Blog</div>
      <h1 class="page-hero-title">Practitioner writing on FP&amp;A</h1>
      <p class="page-hero-desc">
        Original articles for CFOs, VPs of Finance, and FP&amp;A Directors at Series A–C companies.
        Substance over vendor noise.
      </p>
    </section>

    <!-- Published posts loaded from posts.json, then placeholders appended -->
    <div class="blog-list" id="blog-list">
      <!-- Populated by JS below -->
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">FP&amp;A Field Notes</div>
      <div class="footer-credit">
        By <a href="https://seacloudconsulting.com">Mike Duncan, Sea Cloud Consulting</a>
      </div>
    </div>
  </div>
</footer>

<script>
(function () {

  // Placeholder posts — upcoming, not yet published
  var UPCOMING = [
    'Why Rolling Forecasts Win: The Case Against Annual Budgets',
    'How to Build a Headcount Model That Finance and Ops Both Trust',
    'The FP&A Leader\'s Guide to Board Reporting at Series B',
    'Unit Economics for Growth Finance Teams: CAC, LTV, and Payback Period',
    'Zero-Based Budgeting: When It Works and When It Doesn\'t',
    'Driver-Based Forecasting: A Framework for SaaS Companies',
    'How to Present Bad News to the Board Without Losing Credibility',
    'Building Your FP&A Tech Stack: A Practical Guide for Growth Companies',
    'Scenario Planning Under Uncertainty: A Practitioner\'s Approach',
    'Hiring Your First FP&A Analyst: What to Look For',
    'From Spreadsheets to a Real FP&A Stack: A Migration Guide',
    'The CFO\'s First 90 Days at a Series B Company'
  ];

  function formatDate(str) {
    if (!str) return '';
    var d = new Date(str + 'T12:00:00');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function renderPublished(post) {
    return '<a href="blog/' + post.slug + '.html" class="blog-list-item">' +
      '<div class="blog-list-date">' + formatDate(post.date) + '</div>' +
      '<div class="blog-list-content">' +
        '<div class="blog-list-title">' + post.title + '</div>' +
        (post.excerpt ? '<div class="blog-list-desc">' + post.excerpt + '</div>' : '') +
      '</div>' +
    '</a>';
  }

  function renderUpcoming(title) {
    return '<div class="blog-list-item upcoming">' +
      '<div class="blog-list-date" style="font-style:italic;">Upcoming</div>' +
      '<div class="blog-list-content">' +
        '<div class="blog-list-title">' + title +
          '<span class="upcoming-badge">Coming soon</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  fetch('posts.json')
    .then(function (r) { return r.json(); })
    .then(function (posts) {
      posts = posts || [];
      posts.sort(function (a, b) { return b.date.localeCompare(a.date); });

      var html = posts.map(renderPublished).join('');
      html += UPCOMING.map(renderUpcoming).join('');

      var el = document.getElementById('blog-list');
      if (el) el.innerHTML = html;
    })
    .catch(function () {
      // Fallback: show only placeholders
      var html = UPCOMING.map(renderUpcoming).join('');
      var el = document.getElementById('blog-list');
      if (el) el.innerHTML = html;
    });
}());
</script>

</body>
</html>
